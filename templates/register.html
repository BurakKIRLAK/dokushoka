{% extends "base.html" %}
{% block content %}
<div class="form-card">
    <h2>Kayıt Ol</h2>

    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <label>Ad</label>
        <input type="text" name="first_name" required>

        <label>Soyad</label>
        <input type="text" name="last_name" required>

        <label>E-posta</label>
        <input type="email" name="email" required>

        <label>Telefon</label>
        <input type="text" name="phone">

        <label>Şifre</label>
        <input type="password" name="password" required>

        <button type="submit" class="btn">Kayıt Ol</button>
    </form>

    <p style="text-align:center; margin:1em 0;">Ya da</p>

    <a href="{{ url_for('login_google') }}" class="google-btn">
        <img src="{{ url_for('static', filename='images/google_logo.png') }}" alt="Google Logo" style="width:20px; vertical-align:middle; margin-right:0.5em;">
        Google ile Kayıt
    </a>

    <p style="text-align:center; margin-top:1em;">
        Zaten hesabınız var mı? <a href="{{ url_for('login') }}">Giriş Yap</a>
    </p>
</div>
{% endblock %}
